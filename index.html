<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Recetas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7; --surface: #ffffff;
      --border: #e8e4de; --border-strong: #ccc8c0;
      --text: #1a1916; --text-muted: #7a7670; --text-hint: #b0aca4;
      --accent: #1a1916;
      --badge-desayuno-bg:#fdf3e3; --badge-desayuno-fg:#92580a;
      --badge-comida-bg:#e6f4ee;   --badge-comida-fg:#1a6644;
      --badge-cena-bg:#eeecf9;     --badge-cena-fg:#4a3fb0;
      --plan-desayuno-bg:#fdf3e3;  --plan-desayuno-fg:#92580a;
      --plan-comida-bg:#e6f4ee;    --plan-comida-fg:#1a6644;
      --plan-cena-bg:#eeecf9;      --plan-cena-fg:#4a3fb0;
      --radius:10px; --radius-lg:14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── PANTALLA DE LOGIN ── */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem 2rem; width: 100%; max-width: 360px; text-align: center; }
    .login-logo { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); margin-bottom: 0.5rem; }
    .login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 2rem; }
    .login-field { margin-bottom: 12px; text-align: left; }
    .login-field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
    .login-field input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); }
    .login-field input:focus { outline: none; border-color: var(--border-strong); }
    .login-btn { width: 100%; padding: 10px; border-radius: var(--radius); background: var(--accent); color: #fff; border: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 4px; }
    .login-btn:hover { opacity: 0.82; }
    .login-error { font-size: 13px; color: #a33030; margin-top: 10px; min-height: 18px; }

    /* ── BARRA SUPERIOR ── */
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 50; }
    .topbar-logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); }
    .topbar-right { display: flex; gap: 8px; align-items: center; }
    .topbar-nav { display: flex; gap: 4px; }
    .topbar-nav button { padding: 6px 16px; border-radius: 999px; border: 1px solid transparent; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .topbar-nav button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .topbar-nav button:hover:not(.active) { background: var(--bg); color: var(--text); border-color: var(--border); }
    .topbar-user { font-size: 13px; color: var(--text-muted); }
    .btn-logout { padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-muted); cursor: pointer; }
    .btn-logout:hover { border-color: var(--border-strong); color: var(--text); }

    /* ── CONTENIDO PRINCIPAL ── */
    .main { max-width: 980px; margin: 0 auto; padding: 2rem 1.25rem; }
    .view { display: none; } .view.active { display: block; }

    /* ── BARRA DE HERRAMIENTAS ── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .toolbar-left { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .search-wrap { position: relative; }
    .search-wrap input { padding: 8px 14px 8px 36px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); width: 220px; }
    .search-wrap input:focus { outline: none; border-color: var(--border-strong); }
    .search-wrap input::placeholder { color: var(--text-hint); }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-hint); font-size: 15px; pointer-events: none; }
    .cat-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .cat-tab { padding: 6px 14px; border-radius: 999px; font-size: 13px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.12s; }
    .cat-tab.active { background: var(--surface); color: var(--text); border-color: var(--border-strong); font-weight: 500; }
    .cat-tab:hover:not(.active) { border-color: var(--border-strong); color: var(--text); }
    .btn-add { padding: 8px 18px; border-radius: var(--radius); background: var(--accent); color: #fff; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .btn-add:hover { opacity: 0.82; }

    /* ── CUADRÍCULA DE RECETAS ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s, transform 0.15s; }
    .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); border-color: var(--border-strong); transform: translateY(-2px); }
    .card-thumb { width: 100%; height: 150px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 36px; overflow: hidden; position: relative; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-photo-count { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.55); color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 999px; }
    .card-body { padding: 12px 14px 14px; }
    .card-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 5px; line-height: 1.3; }
    .card-ing { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; line-height: 1.4; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; }
    .badge-desayuno { background: var(--badge-desayuno-bg); color: var(--badge-desayuno-fg); }
    .badge-comida   { background: var(--badge-comida-bg);   color: var(--badge-comida-fg); }
    .badge-cena     { background: var(--badge-cena-bg);     color: var(--badge-cena-fg); }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-muted); font-size: 15px; }
    .empty-state .icon { font-size: 44px; margin-bottom: 1rem; }
    .loading { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 14px; }

    /* ── CALENDARIO ── */
    .cal-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.25rem; }
    .cal-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); min-width: 210px; }
    .cal-nav { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 18px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
    .cal-nav:hover { border-color: var(--border-strong); color: var(--text); }
    .cal-legend { display: flex; gap: 10px; margin-left: auto; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--border); gap: 1px; }
    .cal-dayname { background: var(--bg); text-align: center; padding: 9px 4px; font-size: 12px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.03em; }
    .cal-cell { background: var(--surface); min-height: 110px; padding: 6px 5px 5px; position: relative; }
    .cal-cell.empty-cell { background: var(--bg); opacity: 0.7; }
    .day-num { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
    .cal-cell.today .day-num { background: var(--accent); color: #fff; font-weight: 500; }
    .cal-add-btn { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.12s; }
    .cal-cell:hover .cal-add-btn { opacity: 1; }
    .cal-add-btn:hover { border-color: var(--accent); color: var(--accent); }
    .plan-item { display: flex; align-items: center; gap: 3px; padding: 3px 6px; border-radius: 5px; margin-bottom: 3px; font-size: 10px; font-weight: 500; position: relative; }
    .plan-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .plan-del { display: none; border: none; background: transparent; cursor: pointer; font-size: 11px; padding: 0 1px; color: inherit; opacity: 0.7; flex-shrink: 0; }
    .plan-item:hover .plan-del { display: block; }
    .plan-desayuno { background: var(--plan-desayuno-bg); color: var(--plan-desayuno-fg); }
    .plan-comida   { background: var(--plan-comida-bg);   color: var(--plan-comida-fg); }
    .plan-cena     { background: var(--plan-cena-bg);     color: var(--plan-cena-fg); }

    /* ── MODALES ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(15,14,12,0.45); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem; width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
    .modal-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
    .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); line-height: 1.2; }
    .btn-close { background: none; border: none; font-size: 20px; color: var(--text-muted); cursor: pointer; padding: 0 2px; }
    .btn-close:hover { color: var(--text); }
    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .field input, .field select, .field textarea { width: 100%; padding: 9px 13px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--border-strong); }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    /* ── SUBIDA DE FOTOS ── */
    .photo-main-upload { width: 100%; height: 160px; border: 1.5px dashed var(--border); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; background: var(--bg); color: var(--text-hint); font-size: 13px; position: relative; margin-bottom: 10px; }
    .photo-main-upload:hover { border-color: var(--border-strong); }
    .photo-main-upload img { width: 100%; height: 100%; object-fit: cover; }
    .photo-main-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-hint { display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; }
    .upload-hint .u-icon { font-size: 28px; }
    .additional-photos-label { font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; display: block; }
    .additional-photos-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .add-photo-thumb { width: 70px; height: 70px; border-radius: var(--radius); overflow: hidden; position: relative; flex-shrink: 0; border: 1px solid var(--border); }
    .add-photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .add-photo-del { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border-radius: 50%; background: rgba(0,0,0,0.55); border: none; color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .add-photo-btn { width: 70px; height: 70px; border-radius: var(--radius); border: 1.5px dashed var(--border); background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: var(--text-hint); font-size: 11px; gap: 4px; position: relative; flex-shrink: 0; }
    .add-photo-btn:hover { border-color: var(--border-strong); }
    .add-photo-btn .plus { font-size: 22px; line-height: 1; }
    .add-photo-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* ── DETALLE DE FOTOS ── */
    .detail-main-img { width: 100%; height: 230px; border-radius: var(--radius-lg); overflow: hidden; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 52px; margin-bottom: 10px; cursor: pointer; }
    .detail-main-img img { width: 100%; height: 100%; object-fit: cover; }
    .detail-thumbs { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .detail-thumb { width: 60px; height: 60px; border-radius: var(--radius); overflow: hidden; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; transition: border-color 0.12s; }
    .detail-thumb.active { border-color: var(--accent); }
    .detail-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-sec { margin-bottom: 1rem; }
    .detail-sec h3 { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 5px; }
    .detail-sec p { font-size: 14px; color: var(--text); line-height: 1.65; white-space: pre-wrap; }

    .modal-ft { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
    .btn-cancel { padding: 9px 18px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }
    .btn-cancel:hover { border-color: var(--border-strong); color: var(--text); }
    .btn-save { padding: 9px 22px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-save:hover { opacity: 0.82; }
    .btn-danger { padding: 9px 18px; border-radius: var(--radius); border: 1px solid #f0a0a0; background: transparent; color: #a33030; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }
    .btn-danger:hover { background: #fdf0f0; }

    /* ── SELECTOR DE RECETAS (planning) ── */
    .picker-scroll { max-height: 300px; overflow-y: auto; margin-top: 8px; }
    .picker-item { display: flex; align-items: center; gap: 12px; padding: 9px 10px; border-radius: var(--radius); cursor: pointer; border: 1px solid transparent; transition: all 0.12s; margin-bottom: 5px; }
    .picker-item:hover { background: var(--bg); border-color: var(--border); }
    .picker-item.selected { background: var(--bg); border-color: var(--border-strong); }
    .picker-thumb { width: 42px; height: 42px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; flex-shrink: 0; }
    .picker-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .picker-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .picker-cat { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    /* ── VISOR DE FOTO A PANTALLA COMPLETA ── */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: var(--radius); }
    .lightbox-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }

    /* ── RESPONSIVE MÓVIL ── */
    @media (max-width: 600px) {
      .topbar { padding: 0 1rem; }
      .topbar-user { display: none; }
      .main { padding: 1.25rem 0.75rem; }
      .search-wrap input { width: 160px; }
      .cal-legend { display: none; }
      .cal-cell { min-height: 80px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .btn-add { text-align: center; }
      .modal { padding: 1.25rem; }
    }
  </style>
</head>
<body>

<!-- ── PANTALLA DE LOGIN ── -->
<div id="pantalla-login" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">mis recetas</div>
    <div class="login-sub">Inicia sesión para acceder</div>
    <div class="login-field">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="tu@email.com" onkeydown="if(event.key==='Enter')iniciarSesion()">
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" id="login-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')iniciarSesion()">
    </div>
    <button class="login-btn" onclick="iniciarSesion()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── APLICACIÓN PRINCIPAL ── -->
<div id="pantalla-app" style="display:none">
  <div class="topbar">
    <span class="topbar-logo">mis recetas</span>
    <div class="topbar-right">
      <nav class="topbar-nav">
        <button class="active" onclick="mostrarVista('recetas')">Recetas</button>
        <button onclick="mostrarVista('planning')">Planning</button>
      </nav>
      <span class="topbar-user" id="usuario-nombre"></span>
      <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
    </div>
  </div>

  <main class="main">

    <!-- Vista recetas -->
    <div class="view active" id="vista-recetas">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input type="text" id="buscador" placeholder="Buscar receta..." oninput="renderizarRecetas()">
          </div>
          <div class="cat-tabs">
            <button class="cat-tab active" onclick="filtrarCategoria('todas')">Todas</button>
            <button class="cat-tab" onclick="filtrarCategoria('desayuno')">Desayunos</button>
            <button class="cat-tab" onclick="filtrarCategoria('comida')">Comidas</button>
            <button class="cat-tab" onclick="filtrarCategoria('cena')">Cenas</button>
          </div>
        </div>
        <button class="btn-add" onclick="abrirModalNuevaReceta()">+ Añadir receta</button>
      </div>
      <div class="grid" id="cuadricula-recetas"></div>
      <div class="loading" id="cargando-recetas">Cargando recetas...</div>
      <div class="empty-state" id="sin-recetas" style="display:none">
        <div class="icon">🍽</div>
        <p>Aún no hay recetas aquí.<br>¡Añade la primera!</p>
      </div>
    </div>

    <!-- Vista planning -->
    <div class="view" id="vista-planning">
      <div class="cal-header">
        <button class="cal-nav" onclick="cambiarMes(-1)">‹</button>
        <div class="cal-title" id="titulo-mes"></div>
        <button class="cal-nav" onclick="cambiarMes(1)">›</button>
        <div class="cal-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--plan-desayuno-fg)"></div>Desayuno</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--plan-comida-fg)"></div>Comida</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--plan-cena-fg)"></div>Cena</div>
        </div>
      </div>
      <div class="cal-grid" id="cuadricula-calendario"></div>
    </div>

  </main>
</div>

<!-- ── MODAL: AÑADIR RECETA ── -->
<div class="overlay" id="modal-nueva-receta">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title">Nueva receta</span>
      <button class="btn-close" onclick="cerrarModal('modal-nueva-receta')">✕</button>
    </div>
    <div class="field">
      <label>Foto principal</label>
      <div class="photo-main-upload" id="zona-foto-principal">
        <div class="upload-hint" id="texto-foto-principal">
          <span class="u-icon">📷</span>
          <span>Sube la foto principal</span>
        </div>
        <input type="file" accept="image/*" onchange="cargarFotoPrincipal(event)" id="input-foto-principal">
      </div>
      <span class="additional-photos-label">Fotos adicionales</span>
      <div class="additional-photos-row" id="fila-fotos-adicionales">
        <div class="add-photo-btn" id="btn-mas-fotos">
          <span class="plus">+</span>
          <span>Añadir</span>
          <input type="file" accept="image/*" multiple onchange="cargarFotosAdicionales(event)">
        </div>
      </div>
    </div>
    <div class="field"><label>Nombre de la receta</label><input type="text" id="nombre-receta" placeholder="Ej: Tortilla española"></div>
    <div class="field">
      <label>Categoría</label>
      <select id="categoria-receta">
        <option value="desayuno">Desayuno / Merienda</option>
        <option value="comida" selected>Comida</option>
        <option value="cena">Cena</option>
      </select>
    </div>
    <div class="field"><label>Ingredientes</label><textarea id="ingredientes-receta" placeholder="Ej: 3 patatas, 4 huevos, aceite de oliva..."></textarea></div>
    <div class="field"><label>Notas / Preparación</label><textarea id="notas-receta" placeholder="Pasos, tiempos, trucos..."></textarea></div>
    <div class="modal-ft">
      <button class="btn-cancel" onclick="cerrarModal('modal-nueva-receta')">Cancelar</button>
      <button class="btn-save" onclick="guardarReceta()">Guardar receta</button>
    </div>
  </div>
</div>

<!-- ── MODAL: DETALLE DE RECETA ── -->
<div class="overlay" id="modal-detalle-receta">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title" id="detalle-nombre"></span>
      <button class="btn-close" onclick="cerrarModal('modal-detalle-receta')">✕</button>
    </div>
    <div class="detail-main-img" id="detalle-foto-principal" onclick="abrirLightbox()"></div>
    <div class="detail-thumbs" id="detalle-miniaturas"></div>
    <div class="detail-sec"><h3>Categoría</h3><p id="detalle-categoria"></p></div>
    <div class="detail-sec" id="detalle-sec-ingredientes"><h3>Ingredientes</h3><p id="detalle-ingredientes"></p></div>
    <div class="detail-sec" id="detalle-sec-notas"><h3>Notas / Preparación</h3><p id="detalle-notas"></p></div>
    <div class="modal-ft">
      <button class="btn-danger" onclick="eliminarReceta()">Eliminar</button>
      <button class="btn-cancel" onclick="cerrarModal('modal-detalle-receta')">Cerrar</button>
    </div>
  </div>
</div>

<!-- ── MODAL: AÑADIR AL PLANNING ── -->
<div class="overlay" id="modal-planning">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title" id="titulo-modal-planning">Añadir al planning</span>
      <button class="btn-close" onclick="cerrarModal('modal-planning')">✕</button>
    </div>
    <div class="field">
      <label>Tipo de comida</label>
      <select id="tipo-comida-planning">
        <option value="desayuno">Desayuno / Merienda</option>
        <option value="comida" selected>Comida</option>
        <option value="cena">Cena</option>
      </select>
    </div>
    <div class="field">
      <label>Receta</label>
      <input type="text" id="buscador-planning" placeholder="Buscar receta..." oninput="renderizarSelectorRecetas()" style="margin-bottom:8px">
      <div class="picker-scroll" id="selector-recetas"></div>
    </div>
    <div class="modal-ft">
      <button class="btn-cancel" onclick="cerrarModal('modal-planning')">Cancelar</button>
      <button class="btn-save" onclick="confirmarPlanning()">Añadir</button>
    </div>
  </div>
</div>

<!-- ── VISOR FOTO A PANTALLA COMPLETA ── -->
<div class="lightbox" id="lightbox" onclick="cerrarLightbox()">
  <button class="lightbox-close" onclick="cerrarLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- ── FIREBASE SDK ── -->
<script type="module">
  import { initializeApp }                                        from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
  import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

  // ── CONFIGURACIÓN DE FIREBASE ──────────────────────────────────────
  const configuracionFirebase = {
    apiKey: "AIzaSyAQRov1kfm8xItOho8tOhErTi9szv0UalY",
    authDomain: "mis-recetas-6467c.firebaseapp.com",
    projectId: "mis-recetas-6467c",
    storageBucket: "mis-recetas-6467c.firebasestorage.app",
    messagingSenderId: "21913203261",
    appId: "1:21913203261:web:0e757f121f533e4b0eb054"
  };
  // ──────────────────────────────────────────────────────────────────

  const appFirebase = initializeApp(configuracionFirebase);
  const auth        = getAuth(appFirebase);
  const db          = getFirestore(appFirebase);

  // ── VARIABLES DE ESTADO ────────────────────────────────────────────
  let recetas          = [];
  let planning         = {};
  let categoriaActual  = 'todas';
  let fotoPortada      = null;
  let fotosAdicionales = [];
  let idRecetaSeleccionada    = null;
  let idRecetaPlanning        = null;
  let fotosDetalle            = [];
  let indiceActivoDetalle     = 0;
  let diaPlanning = null, mesPlanning = null, anioPlanning = null;
  let mesCalendario  = new Date().getMonth();
  let anioCalendario = new Date().getFullYear();

  // ── CONSTANTES ─────────────────────────────────────────────────────
  const ETIQUETAS_CAT = { desayuno:'Desayuno / Merienda', comida:'Comida', cena:'Cena' };
  const EMOJIS        = { desayuno:'☀️', comida:'🍽️', cena:'🌙' };
  const MESES         = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DIAS_SEMANA   = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

  // ── AUTENTICACIÓN ──────────────────────────────────────────────────

  // Detecta si hay sesión activa al cargar la página
  onAuthStateChanged(auth, usuario => {
    if (usuario) {
      document.getElementById('pantalla-login').style.display = 'none';
      document.getElementById('pantalla-app').style.display   = 'block';
      // Muestra el nombre de usuario (parte antes del @)
      document.getElementById('usuario-nombre').textContent = usuario.email.split('@')[0];
      iniciarEscuchas();
    } else {
      document.getElementById('pantalla-login').style.display = 'flex';
      document.getElementById('pantalla-app').style.display   = 'none';
    }
  });

  // Inicia sesión con email y contraseña
  window.iniciarSesion = async () => {
    const email = document.getElementById('login-email').value.trim();
    const pwd   = document.getElementById('login-pwd').value;
    const error = document.getElementById('login-error');
    error.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, pwd);
    } catch (e) {
      error.textContent = 'Correo o contraseña incorrectos';
    }
  };

  // Cierra la sesión
  window.cerrarSesion = () => signOut(auth);

  // ── ESCUCHAS EN TIEMPO REAL DE FIRESTORE ───────────────────────────
  function iniciarEscuchas() {
    // Escucha cambios en la colección de recetas
    onSnapshot(collection(db, 'recetas'), snap => {
      recetas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      recetas.sort((a, b) => (b.creadoEn || 0) - (a.creadoEn || 0));
      document.getElementById('cargando-recetas').style.display = 'none';
      renderizarRecetas();
      renderizarSelectorRecetas();
    });

    // Escucha cambios en el documento de planning
    onSnapshot(doc(db, 'planning', 'datos'), snap => {
      planning = snap.exists() ? (snap.data() || {}) : {};
      renderizarCalendario();
    });
  }

  // ── NAVEGACIÓN ENTRE VISTAS ────────────────────────────────────────
  window.mostrarVista = v => {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById('vista-' + v).classList.add('active');
    document.querySelectorAll('.topbar-nav button').forEach((b, i) =>
      b.classList.toggle('active', ['recetas', 'planning'][i] === v));
    if (v === 'planning') renderizarCalendario();
  };

  // ── FILTRADO DE RECETAS ────────────────────────────────────────────
  window.filtrarCategoria = c => {
    categoriaActual = c;
    document.querySelectorAll('.cat-tab').forEach((t, i) =>
      t.classList.toggle('active', ['todas', 'desayuno', 'comida', 'cena'][i] === c));
    renderizarRecetas();
  };

  function obtenerRecetasFiltradas() {
    const q = (document.getElementById('buscador').value || '').toLowerCase();
    return recetas.filter(r =>
      (categoriaActual === 'todas' || r.cat === categoriaActual) &&
      (!q || r.nombre.toLowerCase().includes(q) || (r.ingredientes || '').toLowerCase().includes(q))
    );
  }

  // ── RENDERIZADO DE LA CUADRÍCULA DE RECETAS ────────────────────────
  function renderizarRecetas() {
    const cuadricula = document.getElementById('cuadricula-recetas');
    const sinRecetas = document.getElementById('sin-recetas');
    const lista      = obtenerRecetasFiltradas();
    if (!lista.length) { cuadricula.innerHTML = ''; sinRecetas.style.display = 'block'; return; }
    sinRecetas.style.display = 'none';
    const todasLasFotos = r => [r.foto, ...(r.fotos || [])].filter(Boolean);
    cuadricula.innerHTML = lista.map(r => {
      const fotos  = todasLasFotos(r);
      const portada = fotos[0];
      return `
        <div class="card" onclick="abrirDetalle('${r.id}')">
          <div class="card-thumb">
            ${portada ? `<img src="${portada}" alt="">` : `<span>${EMOJIS[r.cat]}</span>`}
            ${fotos.length > 1 ? `<span class="card-photo-count">📷 ${fotos.length}</span>` : ''}
          </div>
          <div class="card-body">
            <div class="card-name">${r.nombre}</div>
            ${r.ingredientes ? `<div class="card-ing">${r.ingredientes.slice(0, 60)}${r.ingredientes.length > 60 ? '…' : ''}</div>` : ''}
            <span class="badge badge-${r.cat}">${ETIQUETAS_CAT[r.cat]}</span>
          </div>
        </div>`;
    }).join('');
  }
  window.renderizarRecetas = renderizarRecetas;

  // ── MODAL: NUEVA RECETA ────────────────────────────────────────────
  window.abrirModalNuevaReceta = () => {
    fotoPortada = null; fotosAdicionales = [];
    document.getElementById('input-foto-principal').value = '';
    document.getElementById('nombre-receta').value        = '';
    document.getElementById('categoria-receta').value     = 'comida';
    document.getElementById('ingredientes-receta').value  = '';
    document.getElementById('notas-receta').value         = '';
    const zona = document.getElementById('zona-foto-principal');
    const imgExistente = zona.querySelector('img'); if (imgExistente) imgExistente.remove();
    document.getElementById('texto-foto-principal').style.display = '';
    renderizarMiniaturasFotosAdicionales();
    abrirModal('modal-nueva-receta');
  };

  // Carga la foto principal desde el dispositivo
  window.cargarFotoPrincipal = e => {
    const archivo = e.target.files[0]; if (!archivo) return;
    leerArchivo(archivo, datos => {
      fotoPortada = datos;
      const zona = document.getElementById('zona-foto-principal');
      let img = zona.querySelector('img');
      if (!img) { img = document.createElement('img'); zona.appendChild(img); }
      img.src = datos;
      document.getElementById('texto-foto-principal').style.display = 'none';
    });
  };

  // Carga fotos adicionales desde el dispositivo
  window.cargarFotosAdicionales = e => {
    const archivos = Array.from(e.target.files);
    let cargadas = 0;
    archivos.forEach(archivo => {
      leerArchivo(archivo, datos => {
        fotosAdicionales.push(datos);
        cargadas++;
        if (cargadas === archivos.length) renderizarMiniaturasFotosAdicionales();
      });
    });
    e.target.value = '';
  };

  // Convierte un archivo a base64
  function leerArchivo(archivo, callback) {
    const fr = new FileReader();
    fr.onload = ev => callback(ev.target.result);
    fr.readAsDataURL(archivo);
  }

  // Actualiza las miniaturas de fotos adicionales en el formulario
  function renderizarMiniaturasFotosAdicionales() {
    const fila = document.getElementById('fila-fotos-adicionales');
    const boton = document.getElementById('btn-mas-fotos');
    fila.querySelectorAll('.add-photo-thumb').forEach(el => el.remove());
    fotosAdicionales.forEach((src, i) => {
      const miniatura = document.createElement('div');
      miniatura.className = 'add-photo-thumb';
      miniatura.innerHTML = `<img src="${src}" alt=""><button class="add-photo-del" onclick="eliminarFotoAdicional(${i})">✕</button>`;
      fila.insertBefore(miniatura, boton);
    });
  }

  // Elimina una foto adicional del formulario
  window.eliminarFotoAdicional = i => {
    fotosAdicionales.splice(i, 1);
    renderizarMiniaturasFotosAdicionales();
  };

  // Guarda la receta en Firestore
  window.guardarReceta = async () => {
    const nombre = document.getElementById('nombre-receta').value.trim();
    if (!nombre) { document.getElementById('nombre-receta').focus(); return; }
    await addDoc(collection(db, 'recetas'), {
      nombre,
      cat:          document.getElementById('categoria-receta').value,
      ingredientes: document.getElementById('ingredientes-receta').value.trim(),
      notas:        document.getElementById('notas-receta').value.trim(),
      foto:         fotoPortada || null,
      fotos:        fotosAdicionales,
      creadoEn:     Date.now()
    });
    cerrarModal('modal-nueva-receta');
  };

  // ── MODAL: DETALLE DE RECETA ───────────────────────────────────────
  window.abrirDetalle = id => {
    const r = recetas.find(x => x.id === id); if (!r) return;
    idRecetaSeleccionada = id;
    fotosDetalle         = [r.foto, ...(r.fotos || [])].filter(Boolean);
    indiceActivoDetalle  = 0;
    document.getElementById('detalle-nombre').textContent    = r.nombre;
    document.getElementById('detalle-categoria').textContent = ETIQUETAS_CAT[r.cat];
    const secIng = document.getElementById('detalle-sec-ingredientes');
    secIng.style.display = r.ingredientes ? '' : 'none';
    document.getElementById('detalle-ingredientes').textContent = r.ingredientes || '';
    const secNotas = document.getElementById('detalle-sec-notas');
    secNotas.style.display = r.notas ? '' : 'none';
    document.getElementById('detalle-notas').textContent = r.notas || '';
    renderizarFotosDetalle();
    abrirModal('modal-detalle-receta');
  };

  // Renderiza la foto principal y las miniaturas en el detalle
  function renderizarFotosDetalle() {
    const fotoPrincipal = document.getElementById('detalle-foto-principal');
    const miniaturas    = document.getElementById('detalle-miniaturas');
    if (!fotosDetalle.length) {
      fotoPrincipal.innerHTML = `<span>${EMOJIS['comida']}</span>`;
      miniaturas.innerHTML = '';
      return;
    }
    fotoPrincipal.innerHTML = `<img src="${fotosDetalle[indiceActivoDetalle]}" alt="">`;
    miniaturas.innerHTML = fotosDetalle.length > 1
      ? fotosDetalle.map((src, i) =>
          `<div class="detail-thumb ${i === indiceActivoDetalle ? 'active' : ''}" onclick="cambiarFotoDetalle(${i})">
             <img src="${src}" alt="">
           </div>`).join('')
      : '';
  }

  // Cambia la foto activa en el detalle
  window.cambiarFotoDetalle = i => {
    indiceActivoDetalle = i;
    renderizarFotosDetalle();
  };

  // Abre la foto a pantalla completa
  window.abrirLightbox = () => {
    if (!fotosDetalle.length) return;
    document.getElementById('lightbox-img').src = fotosDetalle[indiceActivoDetalle];
    document.getElementById('lightbox').classList.add('open');
  };
  window.cerrarLightbox = () => document.getElementById('lightbox').classList.remove('open');

  // Elimina una receta de Firestore
  window.eliminarReceta = async () => {
    if (!idRecetaSeleccionada || !confirm('¿Eliminar esta receta?')) return;
    await deleteDoc(doc(db, 'recetas', idRecetaSeleccionada));
    cerrarModal('modal-detalle-receta');
  };

  // ── CALENDARIO ────────────────────────────────────────────────────
  function claveDelDia(a, m, d) {
    return `${a}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  }

  window.cambiarMes = delta => {
    mesCalendario += delta;
    if (mesCalendario > 11) { mesCalendario = 0; anioCalendario++; }
    else if (mesCalendario < 0) { mesCalendario = 11; anioCalendario--; }
    renderizarCalendario();
  };

  function renderizarCalendario() {
    document.getElementById('titulo-mes').textContent = `${MESES[mesCalendario]} ${anioCalendario}`;
    const cuadricula  = document.getElementById('cuadricula-calendario');
    cuadricula.innerHTML = '';

    // Cabeceras de días de la semana
    DIAS_SEMANA.forEach(d => {
      const el = document.createElement('div'); el.className = 'cal-dayname'; el.textContent = d; cuadricula.appendChild(el);
    });

    const primerDia   = new Date(anioCalendario, mesCalendario, 1).getDay();
    const desplazamiento = primerDia === 0 ? 6 : primerDia - 1;
    const diasDelMes  = new Date(anioCalendario, mesCalendario + 1, 0).getDate();
    const hoy         = new Date();

    // Celdas vacías al inicio del mes
    for (let i = 0; i < desplazamiento; i++) {
      const c = document.createElement('div'); c.className = 'cal-cell empty-cell'; cuadricula.appendChild(c);
    }

    // Celdas de días
    for (let d = 1; d <= diasDelMes; d++) {
      const celda = document.createElement('div'); celda.className = 'cal-cell';
      const esHoy = hoy.getFullYear() === anioCalendario && hoy.getMonth() === mesCalendario && hoy.getDate() === d;
      if (esHoy) celda.classList.add('today');
      const clave    = claveDelDia(anioCalendario, mesCalendario, d);
      const entradas = planning[clave] || [];
      celda.innerHTML = `<span class="day-num">${d}</span><button class="cal-add-btn" onclick="abrirModalPlanning(${d},${mesCalendario},${anioCalendario})">+</button>`;
      entradas.forEach((e, i) => {
        const item = document.createElement('div'); item.className = `plan-item plan-${e.cat}`;
        item.innerHTML = `<span class="plan-name">${e.nombre}</span><button class="plan-del" onclick="eliminarEntradaPlanning('${clave}',${i},event)">✕</button>`;
        celda.appendChild(item);
      });
      cuadricula.appendChild(celda);
    }
  }

  // ── MODAL: PLANNING ───────────────────────────────────────────────
  window.abrirModalPlanning = (d, m, a) => {
    diaPlanning = d; mesPlanning = m; anioPlanning = a; idRecetaPlanning = null;
    document.getElementById('titulo-modal-planning').textContent = `${d} de ${MESES[m]}`;
    document.getElementById('buscador-planning').value = '';
    document.getElementById('tipo-comida-planning').value = 'comida';
    renderizarSelectorRecetas();
    abrirModal('modal-planning');
  };

  // Renderiza el listado de recetas en el selector del planning
  function renderizarSelectorRecetas() {
    const q      = (document.getElementById('buscador-planning')?.value || '').toLowerCase();
    const lista  = recetas.filter(r => !q || r.nombre.toLowerCase().includes(q));
    const el     = document.getElementById('selector-recetas'); if (!el) return;
    if (!lista.length) {
      el.innerHTML = `<div style="color:var(--text-muted);font-size:13px;padding:8px">${recetas.length ? 'Sin resultados' : 'Aún no tienes recetas'}</div>`;
      return;
    }
    const todasLasFotos = r => [r.foto, ...(r.fotos || [])].filter(Boolean);
    el.innerHTML = lista.map(r => {
      const portada = todasLasFotos(r)[0];
      return `
        <div class="picker-item" id="opcion-${r.id}" onclick="seleccionarRecetaPlanning('${r.id}')">
          <div class="picker-thumb">${portada ? `<img src="${portada}" alt="">` : `<span>${EMOJIS[r.cat]}</span>`}</div>
          <div><div class="picker-name">${r.nombre}</div><div class="picker-cat">${ETIQUETAS_CAT[r.cat]}</div></div>
        </div>`;
    }).join('');
  }
  window.renderizarSelectorRecetas = renderizarSelectorRecetas;

  // Selecciona una receta en el planning
  window.seleccionarRecetaPlanning = id => {
    idRecetaPlanning = id;
    document.querySelectorAll('.picker-item').forEach(el => el.classList.remove('selected'));
    const el = document.getElementById('opcion-' + id); if (el) el.classList.add('selected');
  };

  // Confirma y guarda la entrada en el planning
  window.confirmarPlanning = async () => {
    if (!idRecetaPlanning) { alert('Selecciona una receta'); return; }
    const r = recetas.find(x => x.id === idRecetaPlanning); if (!r) return;
    const clave    = claveDelDia(anioPlanning, mesPlanning, diaPlanning);
    const actualizado = { ...planning };
    if (!actualizado[clave]) actualizado[clave] = [];
    actualizado[clave] = [...actualizado[clave], {
      idReceta: r.id,
      nombre:   r.nombre,
      cat:      document.getElementById('tipo-comida-planning').value
    }];
    await setDoc(doc(db, 'planning', 'datos'), actualizado);
    cerrarModal('modal-planning');
  };

  // Elimina una entrada del planning
  window.eliminarEntradaPlanning = async (clave, indice, e) => {
    e.stopPropagation();
    const actualizado = { ...planning };
    if (!actualizado[clave]) return;
    actualizado[clave] = actualizado[clave].filter((_, i) => i !== indice);
    if (!actualizado[clave].length) delete actualizado[clave];
    await setDoc(doc(db, 'planning', 'datos'), actualizado);
  };

  // ── HELPERS ───────────────────────────────────────────────────────
  window.abrirModal  = id => document.getElementById(id).classList.add('open');
  window.cerrarModal = id => document.getElementById(id).classList.remove('open');
</script>
</body>
</html>
